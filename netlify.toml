[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish (Vite builds to 'dist' by default)
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_SUPABASE_URL = "https://kqnqzyklwfrhtywimsjm.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxbnF6eWtsd2ZyaHR5d2ltc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0MTI0MDcsImV4cCI6MjA3Mjk4ODQwN30.pu_nmWzA2SyPUc5yC5TokNu7ki-c4cCjOHxk7DKY4k8"
